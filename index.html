<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile Card</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #afeaf9ee;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-custom {
            width: 350px;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            color: white;
            background: linear-gradient(135deg, #e215b6, #2575fc);
            box-shadow: 0 10px 25px rgba(4, 211, 234, 0.804);
        }

        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid rgb(7, 176, 222);
            margin-bottom: 15px;
        }

        .title {
            font-size: 16px;
            opacity: 0.9;
        }

        .icons a {
            color: white;
            margin: 10px;
            font-size: 22px;
            transition: 0.3s;
        }

        .icons a:hover {
            color: yellow;
            transform: scale(1.2);
        }
    </style>
</head>

<body>

<div class="card-custom">
    
    <!-- Profile Image -->
    <img src="photo.jpeg" class="profile-img" alt="Profile">

    <!-- Name -->
    <h3>harini M</h3>
    <p class="title">Frontend Developer</p>

    <!-- Social Links -->
    <div class="icons">
        <a href="http://www.linkedin.com/in/dharshini-r-5334b2372" target="blank">
            <i class="fab fa-linkedin"></i>
        </a>

        <a href="https://github.com/dharshini302008r" target="blank">
            <i class="fab fa-github"></i>
        </a>

        <a href="#" target="_blank">
            <i class="fab fa-instagram"></i>
        </a>
    </div>

</div>

</body>
</html>
